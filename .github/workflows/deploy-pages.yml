name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "*.svg"
      - "view_svg.html"
      - "view_svg.js"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:   # allow manual trigger from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a new push arrives
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Collect site files
        run: |
          mkdir _site
          cp view_svg.html _site/index.html   # serve as root index
          cp view_svg.js   _site/
          cp periodic_table_*.svg _site/
          echo '<meta http-equiv="refresh" content="0;url=./">' > _site/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
