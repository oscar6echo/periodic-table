<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="330" viewBox="0 0 680 330">
<rect width="680" height="330" fill="#0d1117"/>

<!-- Title -->
<text x="340" y="30" font-size="20" fill="#e6edf3" font-weight="700" font-family="sans-serif" text-anchor="middle">Cr (Z=24) Chromium</text>

<!-- ===== EXPECTED SECTION ===== -->
<text x="340" y="53" font-size="14" fill="#8b949e" font-family="sans-serif" text-anchor="middle">Expected by Aufbau:</text>
<text x="340" y="72" font-size="15" fill="#8b949e" font-family="sans-serif" text-anchor="middle">[Ar] 3d⁴ 4s²</text>

<!-- 4s box: bx=60, by=88, cx=91. Paired: up at 77, down at 105 -->
