<rect x="434" y="88" width="62" height="62" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.8"/>

<!-- Subshell labels (y = 88+62+15 = 165) -->
<text x="91" y="165" font-size="14" fill="#f78166" font-weight="700" font-family="sans-serif" text-anchor="middle">4s</text>
<text x="325" y="165" font-size="14" fill="#56d364" font-weight="700" font-family="sans-serif" text-anchor="middle">3d</text>

<!-- Red X at (550, 88+31=119) -->
<line x1="538" y1="107" x2="562" y2="131" stroke="#f85149" stroke-width="3.5" stroke-linecap="round"/>
<line x1="562" y1="107" x2="538" y2="131" stroke="#f85149" stroke-width="3.5" stroke-linecap="round"/>

<!-- Separator -->
<line x1="40" y1="178" x2="620" y2="178" stroke="#30363d" stroke-width="0.7"/>

<!-- ===== ACTUAL SECTION ===== -->
<text x="340" y="199" font-size="14" fill="#8b949e" font-family="sans-serif" text-anchor="middle">Actual configuration:</text>
<text x="340" y="218" font-size="16" fill="#56d364" font-weight="700" font-family="sans-serif" text-anchor="middle">[Ar] 3d⁵ 4s¹</text>

