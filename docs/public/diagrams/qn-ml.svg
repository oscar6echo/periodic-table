<text x="48" y="23" font-size="10" font-weight="bold" fill="#79c0ff" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">Magnetic</text>
<text x="140" y="50" font-size="42" font-weight="bold" fill="#79c0ff" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">m&#x2097;</text>
<text x="140" y="74" font-size="10" fill="#6e7681" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">Allowed values:</text>
