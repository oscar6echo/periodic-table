<line x1="350" y1="521" x2="350" y2="489" stroke="#79c0ff" stroke-width="2.5" />
<polygon points="345,492 355,492 350,483" fill="#79c0ff" />
<line x1="420" y1="521" x2="420" y2="489" stroke="#79c0ff" stroke-width="2.5" />
<polygon points="415,492 425,492 420,483" fill="#79c0ff" />
