<polygon points="331,772 341,772 336,763" fill="#79c0ff" />
<line x1="364" y1="767" x2="364" y2="799" stroke="#f78166" stroke-width="2.5" />
<polygon points="359,795 369,795 364,804" fill="#f78166" />
<!-- paired box 3 (bx=389): up cx=406, down cx=434 -->
<line x1="406" y1="801" x2="406" y2="769" stroke="#79c0ff" stroke-width="2.5" />
<polygon points="401,772 411,772 406,763" fill="#79c0ff" />
