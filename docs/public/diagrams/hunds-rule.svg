<polygon points="359,655 369,655 364,664" fill="#f78166" />
<!-- spin-up box 3 (cx=420) -->
<line x1="420" y1="661" x2="420" y2="629" stroke="#79c0ff" stroke-width="2.5" />
<polygon points="415,632 425,632 420,623" fill="#79c0ff" />
<text x="280" y="678" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">1</text>
<text x="350" y="678" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">2</text>
<text x="420" y="678" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">3</text>
<text x="350" y="690" font-size="13" fill="#f0b030" font-family="sans-serif" text-anchor="middle">5th electron pairs</text>

