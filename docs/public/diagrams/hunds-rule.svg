<text x="420" y="818" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">3</text>
<text x="350" y="830" font-size="13" fill="#8b949e" font-family="sans-serif" text-anchor="middle">Full subshell — noble gas config</text>

