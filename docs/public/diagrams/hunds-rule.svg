<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="700" height="875" viewBox="0 0 700 875">

<!-- Background -->
<rect width="700" height="875" fill="#0d1117" />

<!-- ===== B (Z=5)  y_offset=8, by=47 ===== -->
<text x="350" y="25" font-size="17" fill="#e6edf3" font-weight="700" font-family="sans-serif" text-anchor="middle">B (Z=5)</text>
<text x="350" y="40" font-size="14" fill="#79c0ff" font-family="sans-serif" text-anchor="middle">2p¹</text>
<rect x="249" y="47" width="62" height="62" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.8" />
<rect x="319" y="47" width="62" height="62" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.8" />
<rect x="389" y="47" width="62" height="62" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.8" />
<!-- spin-up box 1 (cx=280) -->
<line x1="280" y1="101" x2="280" y2="69" stroke="#79c0ff" stroke-width="2.5" />
<polygon points="275,72 285,72 280,63" fill="#79c0ff" />
<text x="280" y="118" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">1</text>
<text x="350" y="118" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">2</text>
<text x="420" y="118" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">3</text>
<text x="350" y="130" font-size="13" fill="#8b949e" font-family="sans-serif" text-anchor="middle">1st electron — enters singly</text>

<!-- ===== C (Z=6)  y_offset=148, by=187 ===== -->
<text x="350" y="165" font-size="17" fill="#e6edf3" font-weight="700" font-family="sans-serif" text-anchor="middle">C (Z=6)</text>
<text x="350" y="180" font-size="14" fill="#79c0ff" font-family="sans-serif" text-anchor="middle">2p²</text>
<rect x="249" y="187" width="62" height="62" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.8" />
<rect x="319" y="187" width="62" height="62" rx="4" fill="#1e1800" stroke="#f0b030" stroke-width="1.8" />
<rect x="389" y="187" width="62" height="62" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.8" />
<!-- spin-up box 1 (cx=280), spin-up box 2 (cx=350) -->
<line x1="280" y1="241" x2="280" y2="209" stroke="#79c0ff" stroke-width="2.5" />
<polygon points="275,212 285,212 280,203" fill="#79c0ff" />
<line x1="350" y1="241" x2="350" y2="209" stroke="#79c0ff" stroke-width="2.5" />
<polygon points="345,212 355,212 350,203" fill="#79c0ff" />
<text x="280" y="258" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">1</text>
<text x="350" y="258" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">2</text>
<text x="420" y="258" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">3</text>
<text x="350" y="270" font-size="13" fill="#f0b030" font-family="sans-serif" text-anchor="middle">2nd electron — new orbital (Hund's rule)</text>

<!-- ===== N (Z=7)  y_offset=288, by=327 ===== -->
<text x="350" y="305" font-size="17" fill="#e6edf3" font-weight="700" font-family="sans-serif" text-anchor="middle">N (Z=7)</text>
<text x="350" y="320" font-size="14" fill="#79c0ff" font-family="sans-serif" text-anchor="middle">2p³</text>
<rect x="249" y="327" width="62" height="62" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.8" />
<rect x="319" y="327" width="62" height="62" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.8" />
<rect x="389" y="327" width="62" height="62" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.8" />
<!-- spin-up all three -->
<line x1="280" y1="381" x2="280" y2="349" stroke="#79c0ff" stroke-width="2.5" />
<polygon points="275,352 285,352 280,343" fill="#79c0ff" />
<line x1="350" y1="381" x2="350" y2="349" stroke="#79c0ff" stroke-width="2.5" />
<polygon points="345,352 355,352 350,343" fill="#79c0ff" />
<line x1="420" y1="381" x2="420" y2="349" stroke="#79c0ff" stroke-width="2.5" />
<polygon points="415,352 425,352 420,343" fill="#79c0ff" />
<text x="280" y="398" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">1</text>
<text x="350" y="398" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">2</text>
<text x="420" y="398" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">3</text>
<text x="350" y="410" font-size="13" fill="#f0b030" font-family="sans-serif" text-anchor="middle">Half-filled — maximum stability</text>

<!-- ===== O (Z=8)  y_offset=428, by=467 ===== -->
<text x="350" y="445" font-size="17" fill="#e6edf3" font-weight="700" font-family="sans-serif" text-anchor="middle">O (Z=8)</text>
<text x="350" y="460" font-size="14" fill="#79c0ff" font-family="sans-serif" text-anchor="middle">2p⁴</text>
<rect x="249" y="467" width="62" height="62" rx="4" fill="#1e1800" stroke="#f0b030" stroke-width="1.8" />
<rect x="319" y="467" width="62" height="62" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.8" />
<rect x="389" y="467" width="62" height="62" rx="4" fill="#21262d" stroke="#30363d" stroke-width="0.8" />
<!-- paired box 1 (bx=249): up cx=266, down cx=294 -->
<line x1="266" y1="521" x2="266" y2="489" stroke="#79c0ff" stroke-width="2.5" />
<polygon points="261,492 271,492 266,483" fill="#79c0ff" />
