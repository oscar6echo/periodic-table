<text x="350" y="538" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">2</text>
<text x="420" y="538" font-size="11" fill="#6e7681" font-family="sans-serif" text-anchor="middle">3</text>
<text x="350" y="550" font-size="13" fill="#f0b030" font-family="sans-serif" text-anchor="middle">Must now pair — 4th e⁻ pairs up</text>

<!-- ===== F (Z=9)  y_offset=568, by=607 ===== -->
<text x="350" y="585" font-size="17" fill="#e6edf3" font-weight="700" font-family="sans-serif" text-anchor="middle">F (Z=9)</text>
