<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 210">
<rect width="280" height="210" fill="#0d1117"/>
<rect x="8" y="8" width="264" height="194" rx="6" fill="#21262d" stroke="#f0b030" stroke-width="1.5"/>
<rect x="14" y="14" width="110" height="18" rx="4" fill="#f0b030" fill-opacity="0.2" stroke="#f0b030" stroke-width="0.8" stroke-opacity="0.4"/>
<text x="69" y="23" font-size="10" font-weight="bold" fill="#f0b030" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">Angular Momentum</text>
<text x="140" y="50" font-size="42" font-weight="bold" fill="#f0b030" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">l</text>
<text x="140" y="74" font-size="10" fill="#6e7681" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">Allowed values:</text>
<text x="140" y="92" font-size="18" font-weight="bold" fill="#f0b030" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">0 to (n&#x2212;1)</text>
<text x="140" y="108" font-size="11" fill="#8b949e" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">0=s  1=p  2=d  3=f</text>
<text x="140" y="124" font-size="10" fill="#6e7681" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">Physical meaning:</text>
<text x="140" y="139" font-size="13" fill="#e6edf3" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">Subshell shape</text>
<text x="140" y="156" font-size="10" fill="#6e7681" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">Determines:</text>
<text x="140" y="172" font-size="13" font-weight="bold" fill="#f0b030" font-family="sans-serif" text-anchor="middle" dominant-baseline="central">Orbital shape (s, p, d, f)</text>
</svg>
