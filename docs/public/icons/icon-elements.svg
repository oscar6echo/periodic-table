<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <!-- Three elliptical orbits at 0°, 60°, 120° -->
  <ellipse cx="20" cy="20" rx="17" ry="7"
           fill="none" stroke="#58a6ff" stroke-width="1.5"/>
  <ellipse cx="20" cy="20" rx="17" ry="7"
           fill="none" stroke="#58a6ff" stroke-width="1.5"
           transform="rotate(60 20 20)"/>
  <ellipse cx="20" cy="20" rx="17" ry="7"
           fill="none" stroke="#58a6ff" stroke-width="1.5"
           transform="rotate(120 20 20)"/>
  <!-- Nucleus -->
  <circle cx="20" cy="20" r="3"   fill="#f0883e"/>
  <!-- Electrons at major-axis tips, one per orbit -->
  <circle cx="37" cy="20"  r="2.2" fill="#58a6ff"/>
  <circle cx="12" cy="35"  r="2.2" fill="#58a6ff"/>
  <circle cx="12" cy="5"   r="2.2" fill="#58a6ff"/>
</svg>
