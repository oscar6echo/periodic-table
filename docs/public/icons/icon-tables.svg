<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 30">
  <!-- Period 1: H (s-block) + He (p-block column) -->
  <rect x="0"  y="0"    width="3"  height="3"    rx="0.6" fill="#58a6ff"/>
  <rect x="41" y="0"    width="3"  height="3"    rx="0.6" fill="#3fb950"/>
  <!-- Periods 2-3: s-block (left) + p-block (right), no d-block -->
  <rect x="0"  y="4"    width="6"  height="7"    rx="0.6" fill="#58a6ff"/>
  <rect x="29" y="4"    width="15" height="7"    rx="0.6" fill="#3fb950"/>
  <!-- Periods 4-7: s-block + d-block + p-block -->
  <rect x="0"  y="12"   width="6"  height="14"   rx="0.6" fill="#58a6ff"/>
  <rect x="7"  y="12"   width="21" height="14"   rx="0.6" fill="#f0883e"/>
  <rect x="29" y="12"   width="15" height="14"   rx="0.6" fill="#3fb950"/>
  <!-- f-block (lanthanides + actinides) -->
  <rect x="7"  y="27.5" width="37" height="2.5"  rx="0.5" fill="#bc8cff"/>
</svg>
